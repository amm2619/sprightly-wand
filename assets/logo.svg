<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d3a28"/>
      <stop offset="0.6" stop-color="#17311f"/>
      <stop offset="1" stop-color="#0b1c12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5c34b"/>
      <stop offset="1" stop-color="#b5891f"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0e8d4"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4d6d"/>
      <stop offset="1" stop-color="#c81d4a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <polygon
    points="512,50 930,295 930,729 512,974 94,729 94,295"
    fill="url(#gold)"
    stroke="#1b3d2a"
    stroke-width="14"/>

  <polygon transform="translate(260 260)"
           points="0,-28 6,-6 28,0 6,6 0,28 -6,6 -28,0 -6,-6"
           fill="#ffffff" fill-opacity="0.9"/>
  <polygon transform="translate(760 300) scale(0.6)"
           points="0,-28 6,-6 28,0 6,6 0,28 -6,6 -28,0 -6,-6"
           fill="#ffffff" fill-opacity="0.85"/>

  <!-- Left card: K -->
  <g transform="translate(380 540) rotate(-12)">
    <rect x="-160" y="-230" width="320" height="460" rx="32" ry="32"
          fill="url(#card)" stroke="#c81d4a" stroke-width="5"/>
    <text x="-120" y="-150" font-family="Georgia, 'Times New Roman', serif"
          font-size="78" font-weight="900" fill="#c81d4a">K</text>
    <path transform="translate(-95 -110) scale(0.32)"
          d="M0,-18 C-18,-40 -55,-32 -55,-2 C-55,28 0,58 0,58 C0,58 55,28 55,-2 C55,-32 18,-40 0,-18 Z"
          fill="url(#heart)"/>
    <text x="0" y="100" font-family="Georgia, 'Times New Roman', serif"
          font-size="340" font-weight="900" fill="#c81d4a" text-anchor="middle">K</text>
    <g transform="translate(120 170) rotate(180)">
      <text x="0" y="30" font-family="Georgia, 'Times New Roman', serif"
            font-size="78" font-weight="900" fill="#c81d4a" text-anchor="middle">K</text>
      <path transform="translate(0 72) scale(0.32)"
            d="M0,-18 C-18,-40 -55,-32 -55,-2 C-55,28 0,58 0,58 C0,58 55,28 55,-2 C55,-32 18,-40 0,-18 Z"
            fill="url(#heart)"/>
    </g>
  </g>

  <!-- Right card: A -->
  <g transform="translate(644 540) rotate(12)">
    <rect x="-160" y="-230" width="320" height="460" rx="32" ry="32"
          fill="url(#card)" stroke="#c81d4a" stroke-width="5"/>
    <text x="-120" y="-150" font-family="Georgia, 'Times New Roman', serif"
          font-size="78" font-weight="900" fill="#c81d4a">A</text>
    <path transform="translate(-90 -110) scale(0.32)"
          d="M0,-18 C-18,-40 -55,-32 -55,-2 C-55,28 0,58 0,58 C0,58 55,28 55,-2 C55,-32 18,-40 0,-18 Z"
          fill="url(#heart)"/>
    <text x="0" y="100" font-family="Georgia, 'Times New Roman', serif"
          font-size="340" font-weight="900" fill="#c81d4a" text-anchor="middle">A</text>
    <g transform="translate(120 170) rotate(180)">
      <text x="0" y="30" font-family="Georgia, 'Times New Roman', serif"
            font-size="78" font-weight="900" fill="#c81d4a" text-anchor="middle">A</text>
      <path transform="translate(0 72) scale(0.32)"
            d="M0,-18 C-18,-40 -55,-32 -55,-2 C-55,28 0,58 0,58 C0,58 55,28 55,-2 C55,-32 18,-40 0,-18 Z"
            fill="url(#heart)"/>
    </g>
  </g>

  <!-- Center floating heart (cards meet here) -->
  <g transform="translate(512 420)">
    <circle cx="0" cy="0" r="74" fill="#ffffff" fill-opacity="0.12"/>
    <path transform="scale(1.8)"
          d="M0,-18 C-18,-40 -55,-32 -55,-2 C-55,28 0,58 0,58 C0,58 55,28 55,-2 C55,-32 18,-40 0,-18 Z"
          fill="url(#heart)"
          stroke="#ffffff" stroke-width="4"/>
  </g>
</svg>
