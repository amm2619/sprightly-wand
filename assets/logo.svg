<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d3a28"/>
      <stop offset="0.6" stop-color="#17311f"/>
      <stop offset="1" stop-color="#0b1c12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5c34b"/>
      <stop offset="1" stop-color="#b5891f"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2317"/>
      <stop offset="1" stop-color="#1b3d2a"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b3d2a"/>
      <stop offset="1" stop-color="#0e2317"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e84646"/>
      <stop offset="1" stop-color="#a01c1c"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b7cd1"/>
      <stop offset="1" stop-color="#13408a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#41a653"/>
      <stop offset="1" stop-color="#1f6e2d"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6bd48"/>
      <stop offset="1" stop-color="#a98220"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <!-- Gold hex shield backdrop (centered at 512,512; scaled to fit ~820px wide) -->
  <g transform="translate(512 512) scale(4.5)">
    <polygon points="0,-92 92,-40 80,60 0,92 -80,60 -92,-40" fill="url(#gold)" stroke="#1b3d2a" stroke-width="3"/>

    <!-- Left trapezoid -->
    <polygon points="-70,-60 -5,-60 -10,60 -48,60" fill="url(#leftGrad)" stroke="#0b2015" stroke-width="2"/>
    <!-- Cards inside left trapezoid -->
    <g transform="translate(-38 0) rotate(-14)">
      <rect x="-24" y="-42" width="18" height="70" rx="3" fill="url(#red)" stroke="#fff" stroke-opacity="0.35" stroke-width="1"/>
    </g>
    <g transform="translate(-38 0) rotate(-2)">
      <rect x="-9" y="-42" width="18" height="70" rx="3" fill="url(#blue)" stroke="#fff" stroke-opacity="0.35" stroke-width="1"/>
    </g>
    <g transform="translate(-38 0) rotate(10)">
      <rect x="6" y="-42" width="18" height="70" rx="3" fill="url(#green)" stroke="#fff" stroke-opacity="0.35" stroke-width="1"/>
    </g>

    <!-- Right trapezoid (mirror) -->
    <polygon points="5,-60 70,-60 48,60 10,60" fill="url(#rightGrad)" stroke="#0b2015" stroke-width="2"/>
    <g transform="translate(38 0) rotate(-10)">
      <rect x="-24" y="-42" width="18" height="70" rx="3" fill="url(#yellow)" stroke="#fff" stroke-opacity="0.35" stroke-width="1"/>
    </g>
    <g transform="translate(38 0) rotate(2)">
      <rect x="-9" y="-42" width="18" height="70" rx="3" fill="url(#red)" stroke="#fff" stroke-opacity="0.35" stroke-width="1"/>
    </g>
    <g transform="translate(38 0) rotate(14)">
      <rect x="6" y="-42" width="18" height="70" rx="3" fill="url(#blue)" stroke="#fff" stroke-opacity="0.35" stroke-width="1"/>
    </g>

    <!-- Wand-spark at top center -->
    <polygon points="0,-82 4,-66 18,-70 8,-58 18,-50 4,-52 0,-36 -4,-52 -18,-50 -8,-58 -18,-70 -4,-66" fill="#fff" fill-opacity="0.95"/>
  </g>
</svg>
